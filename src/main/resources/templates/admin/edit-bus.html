<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Bus | Elite Travel Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #ff4b2b;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-bg); color: #fff; }

        .form-container {
            max-width: 700px;
            margin: 100px auto 50px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
        }
        .form-control:focus { background: rgba(255,255,255,0.1); border-color: var(--primary-color); color: white; }

        .btn-primary { background: var(--primary-color); border: none; padding: 12px; border-radius: 12px; font-weight: 600; }
        .btn-primary:hover { background: #ff3e1d; }

        label { color: #94a3b8; margin-bottom: 8px; }
        h2 { font-weight: 700; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2><i class="bi bi-pencil-square me-2"></i>Edit Bus Details</h2>

        <form th:action="@{/admin/update-bus}" th:object="${bus}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Bus Number</label>
                    <input type="text" class="form-control" th:field="*{busNo}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Price (₹)</label>
                    <input type="number" class="form-control" th:field="*{price}" step="0.01" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>From</label>
                    <input type="text" class="form-control" th:field="*{fromLocation}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>To</label>
                    <input type="text" class="form-control" th:field="*{toLocation}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Departure Time</label>
                    <input type="datetime-local" class="form-control"
                           th:value="${#temporals.format(bus.departureTime, 'yyyy-MM-ddTHH:mm')}"
                           name="departureTime" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Arrival Time</label>
                    <input type="datetime-local" class="form-control"
                           th:value="${#temporals.format(bus.arrivalTime, 'yyyy-MM-ddTHH:mm')}"
                           name="arrivalTime" required>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6 mb-3">
                    <label>Total Seats</label>
                    <input type="number" class="form-control" th:field="*{totalSeats}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Available Seats</label>
                    <input type="number" class="form-control" th:field="*{availableSeats}" required>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/admin/dashboard" class="btn btn-outline-light">Cancel</a>
                <button type="submit" class="btn btn-primary px-4">Update Bus</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
