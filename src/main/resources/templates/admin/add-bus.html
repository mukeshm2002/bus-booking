<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Bus | Elite Travel Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #ff4b2b;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-bg); color: #fff; }

        .form-container {
            max-width: 700px;
            margin: 100px auto 50px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .form-control, .input-group-text {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
        }

        .input-group-text { border-right: none; color: var(--primary-color); }
        .form-control:focus { background: rgba(255,255,255,0.1); border-color: var(--primary-color); color: white; }

        .btn-primary { background: var(--primary-color); border: none; padding: 12px; border-radius: 12px; font-weight: 600; }
        .btn-primary:hover { background: #ff3e1d; }

        label { color: #94a3b8; margin-bottom: 8px; }
        h2 { font-weight: 700; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2><i class="bi bi-bus-front me-2"></i>Add New Bus</h2>

        <form th:action="@{/admin/add-bus}" th:object="${bus}" method="post" id="busForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Bus Number</label>
                    <input type="text" class="form-control" th:field="*{busNo}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Price (₹)</label>
                    <div class="input-group">
                        <span class="input-group-text">₹</span>
                        <input type="number" class="form-control" th:field="*{price}" required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>From</label>
                    <input type="text" class="form-control" th:field="*{fromLocation}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>To</label>
                    <input type="text" class="form-control" th:field="*{toLocation}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Departure Time</label>
                    <input type="datetime-local" class="form-control" th:field="*{departureTime}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Arrival Time</label>
                    <input type="datetime-local" class="form-control" th:field="*{arrivalTime}" required>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6 mb-3">
                    <label>Total Seats</label>
                    <input type="number" class="form-control" th:field="*{totalSeats}" id="totalSeats" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Available Seats</label>
                    <input type="number" class="form-control" th:field="*{availableSeats}" id="availableSeats" required>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Save Bus Details</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // உங்கள் பழைய லாஜிக் இங்கே அப்படியே வேலை செய்யும்
    document.getElementById('totalSeats').addEventListener('change', function() {
        document.getElementById('availableSeats').value = this.value;
    });
</script>
</body>
</html>
