<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Elite Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #ff4b2b;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-bg); color: #fff; }

        .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }

        .error-container {
            max-width: 500px;
            margin: 150px auto;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .error-icon { font-size: 4rem; color: var(--primary-color); margin-bottom: 20px; }

        .btn-modern {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-modern:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,75,43,0.3); color: white; }

        .text-primary-custom { color: var(--primary-color); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/passenger/home">Elite<span class="text-primary-custom">Bus</span></a>
    </div>
</nav>

<div class="container">
    <div class="error-container">
        <div class="error-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
        <h2 class="fw-bold" th:text="${errorTitle}">Oops!</h2>
        <p class="text-secondary mb-4" th:text="${errorMessage}">Something has gone wrong.</p>

        <div class="d-grid gap-2">
            <a href="/passenger/home" class="btn-modern">Back to Home</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
