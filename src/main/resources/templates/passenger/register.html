<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Elite Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #ff4b2b;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-bg); color: #fff; }

        .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }

        .register-container {
            max-width: 450px;
            margin: 120px auto 50px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px;
            border-radius: 12px;
        }
        .form-control:focus { background: rgba(255,255,255,0.1); border-color: var(--primary-color); color: white; }

        .btn-register {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
        }
        .btn-register:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,75,43,0.3); }

        .text-primary-custom { color: var(--primary-color); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/passenger/home">Elite<span class="text-primary-custom">Bus</span></a>
    </div>
</nav>

<div class="container">
    <div class="register-container">
        <h2 class="fw-bold text-center mb-4">Create Account</h2>
        <form th:action="@{/passenger/register}" th:object="${user}" method="post">
            <div class="mb-3">
                <label class="form-label text-secondary">Full Name</label>
                <input type="text" class="form-control" th:field="*{name}" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-secondary">Phone Number</label>
                <input type="tel" class="form-control" id="phoneNumber" th:field="*{phoneNumber}" required>
            </div>

            <div class="mb-4">
                <label class="form-label text-secondary">Email Address</label>
                <input type="email" class="form-control" th:field="*{email}" required>
            </div>

            <button type="submit" class="btn-register">Register Now</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-secondary">Already have an account? <a href="/passenger/home" class="text-primary-custom text-decoration-none">Login</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('phoneNumber').addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>
</body>
</html>
