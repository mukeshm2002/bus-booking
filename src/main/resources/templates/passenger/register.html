<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Elite Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff4b2b;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-bg); color: #fff; }
        .login-container {
            max-width: 400px;
            margin: 150px auto;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px;
            border-radius: 12px;
        }
        .form-control:focus { background: rgba(255,255,255,0.1); border-color: var(--primary-color); color: white; }
        .btn-login {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
        }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,75,43,0.3); }
        .text-primary-custom { color: var(--primary-color); }
    </style>
</head>
<body>

<div class="container">
    <div class="login-container">
        <h2 class="fw-bold text-center mb-4">Welcome Back</h2>

        <div th:if="${param.error}" class="alert alert-danger" style="background: rgba(220,53,69,0.2); border: none; color: white;">
            Invalid email or password.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label text-secondary">Email Address</label>
                <input type="email" name="username" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-secondary">New here? <a href="/passenger/register" class="text-primary-custom text-decoration-none">Create an account</a></p>
        </div>
    </div>
</div>

</body>
</html>
