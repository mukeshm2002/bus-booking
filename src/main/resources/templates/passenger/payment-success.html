<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed | Elite Travel</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

  <style>
    :root {
        --primary-color: #ff4b2b;
        --dark-bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
    }

    body { font-family: 'Outfit', sans-serif; background-color: var(--dark-bg); color: #fff; }

    .success-container {
        max-width: 500px;
        margin: 100px auto;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        padding: 40px;
        border-radius: 25px;
        border: 1px solid rgba(255,255,255,0.1);
        text-align: center;
    }

    .success-icon {
        font-size: 4rem;
        color: #22c55e;
        margin-bottom: 20px;
        animation: pop 0.5s ease-out;
    }

    @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

    .booking-details {
        background: rgba(255,255,255,0.03);
        padding: 20px;
        border-radius: 15px;
        margin: 25px 0;
        text-align: left;
        border: 1px solid rgba(255,255,255,0.05);
    }

    .btn-modern {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 12px;
        font-weight: 600;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn-modern:hover { background: #ff3e1d; color: white; transform: translateY(-2px); }

    .text-primary-custom { color: var(--primary-color); }
  </style>
</head>
<body>

<div class="container">
  <div class="success-container">
    <div class="success-icon"><i class="bi bi-check-circle-fill"></i></div>
    <h2 class="fw-bold">Payment Successful!</h2>
    <p class="text-secondary">Your trip has been confirmed. Thank you!</p>

    <div class="booking-details">
      <div class="d-flex justify-content-between mb-2">
        <span class="text-secondary">Booking ID:</span>
        <span th:text="${booking.bookingId}"></span>
      </div>
      <div class="d-flex justify-content-between mb-2">
        <span class="text-secondary">Bus:</span>
        <span th:text="${booking.bus.busNo}"></span>
      </div>
      <div class="d-flex justify-content-between">
        <span class="text-secondary">Seat No:</span>
        <span th:text="${booking.seatNo}"></span>
      </div>
    </div>

    <div class="d-grid gap-2">
      <a th:href="@{/passenger/profile}" class="btn-modern">View Booking</a>
      <a th:href="@{/passenger/home}" class="text-secondary text-decoration-none mt-2">Back to Home</a>
    </div>
  </div>
</div>

<script>
  // 5 வினாடிகளுக்குப் பிறகு ரீடைரெக்ட்
  setTimeout(() => { window.location.href = '/passenger/profile'; }, 5000);
</script>
</body>
</html>
