<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | Elite Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #ff4b2b; /* இங்கே நிறத்தை மாற்றிக்கொள்ளுங்கள் (Blue ஆக்க #00d2ff) */
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-bg); color: #fff; }

        .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }

        .search-header {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 100px;
            margin-bottom: 30px;
        }

        .bus-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .bus-card:hover { border-color: var(--primary-color); transform: scale(1.01); }

        .price { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); }

        .btn-book {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
        }

        .badge-seats { background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 8px; }

        .no-results { text-align: center; padding: 60px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/passenger/home">Elite<span style="color:var(--primary-color)">Bus</span></a>
    </div>
</nav>

<div class="container my-5">
    <!-- Header -->
    <div class="search-header">
        <h3 class="fw-bold">Search Results</h3>
        <p class="text-secondary" th:text="'பயணம்: ' + ${buses[0].fromLocation} + ' ➔ ' + ${buses[0].toLocation} + ' | தேதி: ' + ${searchDate}"></p>
    </div>

    <!-- No Results -->
    <div th:if="${buses.empty}" class="no-results">
        <i class="bi bi-bus-front fs-1 text-secondary"></i>
        <h4 class="mt-3">There are no buses!</h4>
        <a href="/passenger/home" class="btn btn-outline-light mt-3">Search again</a>
    </div>

    <!-- Bus List -->
    <div th:each="bus : ${buses}" class="bus-card">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h4 class="fw-bold mb-3" th:text="${bus.busNo}"></h4>
                <div class="d-flex gap-4">
                    <div>
                        <small class="text-secondary d-block">Departure</small>
                        <span th:text="${#temporals.format(bus.departureTime, 'HH:mm')}"></span>
                    </div>
                    <div>
                        <small class="text-secondary d-block">Arrival</small>
                        <span th:text="${#temporals.format(bus.arrivalTime, 'HH:mm')}"></span>
                    </div>
                    <div>
                        <small class="text-secondary d-block">Available Seats</small>
                        <span class="badge-seats" th:text="${bus.availableSeats}"></span>
                    </div>
                </div>
            </div>
            <div class="col-md-4 text-md-end mt-4 mt-md-0">
                <div class="price mb-2" th:text="${'₹' + bus.price}"></div>
                <a th:href="@{/passenger/seat-selection/{busNo}(busNo=${bus.busNo}, date=${searchDate})}"
                   class="btn btn-book">Book Now</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
