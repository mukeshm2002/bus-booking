<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Payment | Elite Travel</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

  <style>
    :root {
        --primary-color: #ff4b2b;
        --dark-bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
    }

    body { font-family: 'Outfit', sans-serif; background-color: var(--dark-bg); color: #fff; }

    .payment-container {
        max-width: 500px;
        margin: 100px auto;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        padding: 40px;
        border-radius: 25px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .booking-summary {
        background: rgba(255,255,255,0.03);
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 25px;
    }

    .payment-method {
        display: flex;
        align-items: center;
        padding: 15px;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: 0.3s;
    }
    .payment-method:hover { border-color: var(--primary-color); background: rgba(255,75,43,0.1); }

    .btn-confirm {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 12px;
        font-weight: 700;
        width: 100%;
        transition: 0.3s;
    }
    .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,75,43,0.3); }

    .text-primary-custom { color: var(--primary-color); }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/passenger/home">Elite<span class="text-primary-custom">Bus</span></a>
  </div>
</nav>

<div class="container">
  <div class="payment-container">
    <h3 class="fw-bold text-center mb-4">Payment Details</h3>

    <!-- Booking Summary -->
    <div class="booking-summary">
      <h6 class="text-secondary mb-3">BOOKING SUMMARY</h6>
      <div class="d-flex justify-content-between mb-2">
        <span>Bus:</span>
        <span th:text="${booking.bus.busNo}"></span>
      </div>
      <div class="d-flex justify-content-between mb-2">
        <span>Seat:</span>
        <span th:text="${booking.seatNo}"></span>
      </div>
      <div class="d-flex justify-content-between">
        <span>Amount:</span>
        <span class="fw-bold text-primary-custom" th:text="${'₹' + booking.bus.price}"></span>
      </div>
    </div>

    <!-- Payment Methods -->
    <div class="mb-4">
      <h6 class="text-secondary mb-3">SELECT PAYMENT METHOD</h6>
      <label class="payment-method">
        <input type="radio" name="paymentMethod" value="upi" class="me-3" checked>
        <i class="bi bi-phone me-2"></i> UPI Payment
      </label>
      <label class="payment-method">
        <input type="radio" name="paymentMethod" value="card" class="me-3">
        <i class="bi bi-credit-card me-2"></i> Credit/Debit Card
      </label>
    </div>

    <form th:action="@{/passenger/confirm-payment}" method="post">
      <input type="hidden" name="bookingId" th:value="${booking.bookingId}">
      <button type="submit" class="btn-confirm">Confirm & Pay</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
