<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusTicketBooking | Elite Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        :root {
            /* இங்கே நிறத்தை மாற்றிக்கொள்ளுங்கள்: Red (#ff4b2b) அல்லது Blue (#00d2ff) */
            --primary-color: #ff4b2b;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-bg); color: #fff; }

        .navbar { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); }

        .hero-section {
            padding: 120px 0;
            background: radial-gradient(circle at top right, rgba(255, 75, 43, 0.15), transparent);
        }

        .search-wrapper {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px;
            border-radius: 12px;
        }

        .btn-modern {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-modern:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,75,43,0.3); }

        .route-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s;
            cursor: pointer;
        }

        .route-card:hover { border-color: var(--primary-color); transform: scale(1.02); }

        .text-primary-custom { color: var(--primary-color); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Elite<span class="text-primary-custom">Bus</span></a>
    </div>
</nav>

<section class="hero-section">
    <div class="container text-center">
        <h1 class="display-3 fw-bold mb-4">Have a pleasant journey</h1>

        <div class="row justify-content-center">
            <div class="col-lg-10 search-wrapper">
                <form th:action="@{/passenger/search}" method="post" th:object="${search}">
                    <div class="row g-3">
                        <div class="col-md-4"><input type="text" class="form-control" th:field="*{fromLocation}" placeholder="From "></div>
                        <div class="col-md-4"><input type="text" class="form-control" th:field="*{toLocation}" placeholder="To "></div>
                        <div class="col-md-2"><input type="date" class="form-control" th:field="*{date}"></div>
                        <div class="col-md-2"><button type="submit" class="btn btn-modern w-100">Search</button></div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<div class="container py-5">
    <h4 class="mb-4">Popular Routes</h4>
    <div class="row g-4">
        <div class="col-md-3">
            <div class="route-card" onclick="setRoute('Chennai', 'Coimbatore')">
                <i class="bi bi-geo-alt-fill text-primary-custom fs-4"></i>
                <h6 class="mt-3">Chennai to Coimbatore</h6>
                <small class="text-secondary">Comfortable AC Sleeper</small>
            </div>
        </div>
    </div>
</div>

<script>
    function setRoute(from, to) {
        document.querySelector('input[name="fromLocation"]').value = from;
        document.querySelector('input[name="toLocation"]').value = to;
    }
</script>
</body>
</html>
