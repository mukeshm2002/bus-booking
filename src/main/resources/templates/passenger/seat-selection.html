<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seat | Elite Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #ff4b2b;
            --dark-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body { font-family: 'Outfit', sans-serif; background-color: var(--dark-bg); color: #fff; }

        .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }

        .bus-details-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 100px;
        }

        .seat-map-wrapper {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            display: inline-block;
            margin: 20px auto;
        }

        .seat-map {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .seat {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .available { background: rgba(255,255,255,0.05); }
        .available:hover { background: rgba(255,255,255,0.2); }

        .booked { background: #334155; color: #64748b; cursor: not-allowed; opacity: 0.5; }

        .selected { background: var(--primary-color) !important; color: white; transform: scale(1.1); }

        .btn-proceed {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
        }

        .driver {
            grid-column: 1 / -1;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/passenger/home">Elite<span style="color:var(--primary-color)">Bus</span></a>
    </div>
</nav>

<div class="container my-5">
    <!-- Bus Info -->
    <div class="bus-details-box text-center">
        <h3 class="fw-bold" th:text="${bus.busNo}"></h3>
        <p class="text-secondary" th:text="${bus.fromLocation + ' ➔ ' + bus.toLocation}"></p>
        <div class="d-flex justify-content-center gap-4 mt-3">
            <span><i class="bi bi-cash"></i> ₹<span th:text="${bus.price}"></span></span>
            <span><i class="bi bi-people"></i> Seats: <span th:text="${bus.availableSeats}"></span></span>
        </div>
    </div>

    <!-- Seat Map -->
    <div class="text-center mt-5">
        <div class="seat-map-wrapper">
            <div class="seat-map">
                <div class="driver"><i class="bi bi-steering"></i> Driver Seat</div>
                <div th:each="seat : ${#numbers.sequence(1, bus.totalSeats)}"
                     th:classappend="${bookings.?[seatNo == seat].size() > 0} ? 'booked' : 'available'"
                     class="seat"
                     th:text="${seat}"
                     onclick="selectSeat(this)"></div>
            </div>
        </div>
    </div>

    <!-- Booking Form -->
    <div class="row justify-content-center">
        <div class="col-md-4">
            <form th:action="@{/passenger/book-seat}" method="post" id="bookingForm">
                <input type="hidden" name="busNo" th:value="${bus.busNo}">
                <input type="hidden" name="date" th:value="${date}">
                <input type="hidden" name="seatNo" id="selectedSeat">
                <button type="submit" class="btn btn-proceed" id="bookButton" disabled>Proceed to Payment</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let selectedSeat = null;

    function selectSeat(element) {
        if (element.classList.contains('booked')) return;

        if (selectedSeat) {
            selectedSeat.classList.remove('selected');
        }

        if (selectedSeat === element) {
            selectedSeat = null;
            document.getElementById('selectedSeat').value = '';
            document.getElementById('bookButton').disabled = true;
        } else {
            element.classList.add('selected');
            selectedSeat = element;
            document.getElementById('selectedSeat').value = element.textContent;
            document.getElementById('bookButton').disabled = false;
        }
    }
</script>
</body>
</html>
