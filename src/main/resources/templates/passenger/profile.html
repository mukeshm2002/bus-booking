<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Elite Travel</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

  <style>
    :root {
        --primary-color: #ff4b2b;
        --dark-bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
    }

    body { font-family: 'Outfit', sans-serif; background-color: var(--dark-bg); color: #fff; }

    .navbar { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }

    .profile-container {
        max-width: 900px;
        margin: 100px auto 50px;
        padding: 40px;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        border-radius: 25px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .profile-card {
        background: rgba(255,255,255,0.03);
        padding: 25px;
        border-radius: 20px;
        margin-bottom: 30px;
    }

    .booking-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 25px;
        margin-bottom: 20px;
        transition: 0.3s;
    }
    .booking-card:hover { border-color: var(--primary-color); transform: scale(1.01); }

    .status-confirmed { color: #22c55e; font-weight: 600; }
    .text-primary-custom { color: var(--primary-color); }
    .btn-home { border: 1px solid var(--primary-color); color: var(--primary-color); border-radius: 12px; }
    .btn-home:hover { background: var(--primary-color); color: white; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/passenger/home">Elite<span class="text-primary-custom">Bus</span></a>
  </div>
</nav>

<div class="container">
  <div class="profile-container">
    <h2 class="fw-bold mb-4">My Profile</h2>

    <!-- Personal Info -->
    <div class="profile-card">
      <h5 class="mb-3 text-secondary">PERSONAL INFORMATION</h5>
      <div class="row g-3">
        <div class="col-md-4">
          <small class="d-block text-secondary">Name</small>
          <span th:text="${session.user.name}"></span>
        </div>
        <div class="col-md-4">
          <small class="d-block text-secondary">Phone</small>
          <span th:text="${session.user.phoneNumber}"></span>
        </div>
        <div class="col-md-4">
          <small class="d-block text-secondary">Email</small>
          <span th:text="${session.user.email}"></span>
        </div>
      </div>
    </div>

    <!-- Bookings -->
    <h5 class="mb-3 text-secondary">BOOKING HISTORY</h5>

    <div th:if="${bookings.empty}" class="text-center py-5">
      <i class="bi bi-ticket-perforated fs-1 text-secondary"></i>
      <p class="mt-3">There are no bookings.</p>
      <a href="/passenger/home" class="btn btn-home">Book a new trip</a>
    </div>

    <div th:each="booking : ${bookings}" class="booking-card">
      <div class="row align-items-center">
        <div class="col-md-8">
          <h5 class="fw-bold" th:text="${booking.bus.busNo + ' ➔ ' + booking.bus.toLocation}"></h5>
          <p class="text-secondary mb-1">
            <small>Departure: <span th:text="${#temporals.format(booking.bus.departureTime, 'dd-MM-yyyy HH:mm')}"></span></small>
          </p>
          <p class="mb-0">
            Seat: <span class="fw-bold" th:text="${booking.seatNo}"></span> |
            Price: ₹<span th:text="${booking.bus.price}"></span> |
            Status: <span class="status-confirmed" th:text="${booking.status}"></span>
          </p>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
          <small class="d-block text-secondary">Booking ID</small>
          <span class="fw-bold" th:text="${booking.bookingId}"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
